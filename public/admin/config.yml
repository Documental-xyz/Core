      name: 'mapView'
      widget: 'string'
      required: true
      hint: 'Enter the Map View ID (ex: view_0). It must match a Map View registered in the MapBox block.'
      collapsed: true
    - label: 'Text Color'
      name: 'txtColor'
      widget: 'color'
      required: false
      enableAlpha: true
      allowInput: true
      collapsed: true
    - label: 'Background Color'
      name: 'bgColor'
      widget: 'color'
      required: false
      enableAlpha: true
      allowInput: true
      collapsed: true
spacer: &spacer
  label: 'Spacer'
  name: 'Spacer'
  widget: 'object'
  summary: '{{fields.desktop}}'
  collapsed: true
  fields:
