      name: 'imageLeft'
      widget: 'image'
      required: true
      multiple: false
      collapsed: true
    - label: 'Right image'
      name: 'imageRight'
      widget: 'image'
      required: true
      multiple: false
      collapsed: true
    - label: 'Caption'
      name: 'caption'
      widget: 'markdown'
      required: false
      collapsed: true
mapView: &mapView
  label: 'Map View'
  name: 'MapView'
  widget: 'object'
