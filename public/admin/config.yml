htmlEmbed: &htmlEmbed
  label: 'HTML Embed'
  name: 'HtmlEmbed'
  widget: 'object'
  summary: 'HTML Embed'
  collapsed: true
  fields:
    - label: 'Type'
      name: 'type'
      widget: 'hidden'
      default: 'HtmlEmbed'
      collapsed: true
    - label: 'Wide'
      name: 'wideHtml'
      widget: 'boolean'
      required: false
      default: false
      collapsed: true
