backend:
  name: github
  repo: documental-xyz/Documental
  branch: main


media_libraries:
  default:
    config:
      slugify_filename: true

media_folder: public/uploads
public_folder: uploads

logo:
  src: /admin/logo.svg
  show_in_header: true

app_title: Documental
pageSettings: &pageSettings
  label: 'Page Settings'
  name: 'pageSettings'
  widget: 'object'
  required: false
  collapsed: true
  fields:
    - label: 'Language'
      name: 'language'
      widget: 'select'
      options: ['pt-BR', 'en', 'es']
      default: 'pt-BR'
      collapsed: true
    - label: 'Slug PT-BR'
      name: 'link_pt_br'
      widget: 'string'
      required: false
      default: '#'
      collapsed: true
    - label: 'Slug EN'
      name: 'link_en'
      widget: 'string'
      required: false
      default: '#'
      collapsed: true
    - label: 'Slug ES'
      name: 'link_es'
      widget: 'string'
      required: false
      default: '#'
      collapsed: true
    - label: 'Animations'
      name: 'animations'
      widget: 'select'
      options:
        - { label: 'Enable All', value: 'enable_all' }
        - { label: 'Disable All', value: 'disable_all' }
        - { label: 'Custom by Components', value: 'custom' }
      default: 'enable_all'
      required: true
      hint: 'Control animation behavior for the entire page'
      collapsed: true
    - label: 'Text Direction'
      name: 'direction'
      widget: 'select'
      options: ['left', 'right']
      default: 'left'
      collapsed: true
    - label: 'SEO Title'
      name: 'seoTitle'
      widget: 'string'
      required: false
      hint: 'title shown in search results and in link previews on social media'
      collapsed: true
    - label: 'SEO Description'
      name: 'seoDescription'
      widget: 'string'
      required: false
      hint: 'description of the page shown in search results and in link previews on social media'
      collapsed: true
    - label: 'SEO Keywords'
      name: 'seoKeywords'
      widget: 'list'
      required: false
      hint: 'keywords that help search engines understand the page topic'
      collapsed: true
      fields:
        - { label: 'Keyword', name: 'keyword', widget: 'string', collapsed: true }
    - label: 'SEO Image'
      name: 'seoImage'
      widget: 'image'
      required: false
      hint: 'image shown in link previews on social media'
      collapsed: true
pageTheme: &pageTheme
  label: 'Page Theme'
  name: 'pageTheme'
  widget: 'object'
  required: false
  collapsed: true
  fields:
    - label: 'Primary Color'
      name: 'primaryColor'
      widget: 'color'
      required: false
      allowInput: true
      allowAlpha: true
      collapsed: true
    - label: 'Secondary Color'
      name: 'secondaryColor'
      widget: 'color'
      required: false
      allowInput: true
      allowAlpha: true
      collapsed: true
    - label: 'Highlight Color'
      name: 'highlightColor'
      widget: 'color'
      required: false
      allowInput: true
      allowAlpha: true
      collapsed: true
    - label: 'Auxiliary Color'
      name: 'auxiliaryColor'
      widget: 'color'
      required: false
      allowInput: true
      allowAlpha: true
      collapsed: true
    - label: 'Heading Font'
      name: 'displayFont'
      widget: 'string'
      required: false
      collapsed: true
      hint: 'browse a heading font on [Google Fonts](https://fonts.google.com/)'
    - label: 'Body Font'
      name: 'textFont'
      widget: 'string'
      required: false
      collapsed: true
      hint: 'browse a body font on [Google Fonts](https://fonts.google.com/)'
    - label: 'Spacing Patterns'
      name: 'spacingPatterns'
      widget: 'list'
      collapsed: true
      fields:
        - label: 'Pattern Name'
          name: 'name'
          widget: 'string'
          required: true
          collapsed: true
        - label: 'Mobile Value'
          name: 'mobile'
          widget: 'string'
          required: true
          collapsed: true
        - label: 'Tablet Value'
          name: 'tablet'
          widget: 'string'
          required: true
          collapsed: true
        - label: 'Desktop Value'
          name: 'desktop'
          widget: 'string'
          required: true
          collapsed: true
text: &text
  label: 'Text'
  name: 'Text'
  widget: 'object'
  summary: '{{fields.content}}'
  collapsed: true
  fields:
    - label: 'Dropcap'
      name: 'hasDropCap'
      widget: 'boolean'
      required: false
      collapsed: true
    - label: 'Type'
      name: 'type'
      widget: 'hidden'
      default: 'Text'
      collapsed: true
    - label: 'Content'
      name: 'content'
      widget: 'markdown'
      required: false
      collapsed: true
button: &button
  label: 'Button'
  name: 'Button'
  widget: 'object'
  summary: '{{fields.link.text}}'
  collapsed: true
  fields:
    - label: 'Type'
      name: 'type'
      widget: 'hidden'
      default: 'Button'
      collapsed: true
    - label: 'Link'
      name: 'link'
      widget: 'object'
      required: true
      collapsed: true
      fields:
        - label: 'URL'
          name: 'url'
          widget: 'string'
          required: true
          collapsed: true
        - label: 'Target'
          name: 'target'
          widget: 'select'
          options: ['_self', '_blank']
          default: '_self'
          required: false
          collapsed: true
        - label: 'Text'
          name: 'text'
          widget: 'string'
          required: true
          collapsed: true
    - label: 'Icon HTML'
      name: 'icon'
      widget: 'string'
      required: false
      hint: 'HTML do ícone Material Symbols, ex: <span class="material-symbols-outlined">arrow_right_alt</span>'
      collapsed: true
    - label: 'Size'
      name: 'size'
      widget: 'select'
      options:
        - { label: 'Normal', value: '' }
        - { label: 'Wide', value: 'wide' }
      required: false
      collapsed: true
imageBlock: &imageBlock
  label: 'Image'
  name: 'ImageBlock'
  widget: 'object'
  summary: '{{fields.src}}'
  collapsed: true
  fields:
    - label: 'Type'
      name: 'type'
      widget: 'hidden'
      default: 'ImageBlock'
      collapsed: true
    - label: 'Wide'
      name: 'wideImage'
      widget: 'boolean'
      required: false
      default: false
      collapsed: true
    - label: 'Image'
      name: 'src'
      widget: 'image'
      required: false
      collapsed: true
    - label: 'Alt Text'
      name: 'alt'
      widget: 'string'
      required: false
      hint: 'used to describe the image for screen readers'
      collapsed: true
    - label: 'Description'
      name: 'description'
      widget: 'string'
      required: false
      collapsed: true
include: &include
  label: 'Include'
  name: 'Include'
  widget: 'object'
  summary: '{{fields.slug}}'
  collapsed: true
  fields:
    - label: 'Type'
      name: 'type'
      widget: 'hidden'
      default: 'Include'
      collapsed: true
    - label: 'ID'
      name: 'id'
      widget: 'string'
      required: false
      hint: 'Component identifier name. Must be unique for each component. Use only letters and numbers.'
      collapsed: true
    - label: 'Short Title'
      name: 'shortTitle'
      widget: 'string'
      required: false
      hint: 'Component short title.'
      collapsed: true
    - label: 'Slug da página alvo'
      name: 'slug'
      widget: 'string'
      required: false
      hint: 'Slug da página cujo conteúdo será incluído aqui.'
      collapsed: true
videoEmbed: &videoEmbed
  label: 'Video Embed'
  name: 'VideoEmbed'
  widget: 'object'
