gallery: &gallery
  label: 'Image Gallery'
  name: 'Gallery'
  widget: 'object'
  summary: '{{fields.uniqid}}'
  collapsed: true
  fields:
    - label: 'Type'
      name: 'type'
      widget: 'hidden'
      default: 'Gallery'
      collapsed: true
    - label: 'Unique ID'
      name: 'uniqid'
      widget: 'string'
      required: true
      hint: 'Gallery identifier name. Must be unique for each gallery component'
      collapsed: true
    - label: 'Description'
      name: 'description'
      widget: 'markdown'
      required: false
      collapsed: true
    - label: 'Images'
      name: 'images'
      # max: 8 — baseado em nhanderekoa.md (max 6 imagens por Gallery, 2 instâncias). Permite ~25% crescimento.
      # Adicionado em Fase 1 do plano sveltia-perf para prevenir agravamento de lag.
      # Ver .omo/plans/sveltia-perf-fase0-fase1.md Task 8.
      widget: 'list'
      min: 0
      max: 8
      required: false
      collapsed: true
      fields:
        - label: 'Image'
          name: 'image'
          widget: 'image'
          required: false
          collapsed: true
        - label: 'Caption'
          name: 'caption'
          widget: 'markdown'
          required: false
          collapsed: true
slider: &slider
  label: 'Image Slider'
  name: 'Slider'
