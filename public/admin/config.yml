      name: 'htmlCode'
      widget: 'code'
      required: true
      default_language: 'html'
      output_code_only: true
      collapsed: true
    - label: 'Caption'
      name: 'htmlCaption'
      widget: 'string'
      required: false
      collapsed: true
chartBar: &chartBar
  label: 'Bar Chart'
  name: 'ChartBar'
  widget: 'object'
  summary: '{{fields.chartTitle}}'
  collapsed: true
  fields:
    - label: 'Type'
      name: 'type'
      widget: 'hidden'
      default: 'ChartBar'
      collapsed: true
    - label: 'Title'
      name: 'chartTitle'
      widget: 'string'
      required: false
      collapsed: true
    - label: 'Notes'
      name: 'chartNotes'
      widget: 'string'
      required: false
      collapsed: true
    - label: 'Chart Bars'
      name: 'chartBars'
      widget: 'list'
      required: false
      collapsed: true
      fields:
        - label: 'Label'
          name: 'label'
          widget: 'string'
          required: false
          collapsed: true
        - label: 'Color'
          name: 'color'
          widget: 'color'
          required: false
          enableAlpha: true
          allowInput: true
          collapsed: true
        - label: 'Number'
          name: 'number'
          widget: 'number'
          value_type: 'float'
          step: 0.01
          required: false
          collapsed: true
        - label: 'Number Percent'
          name: 'numberPercent'
          widget: 'number'
          required: false
          value_type: 'float'
          min: 0
          max: 100
          step: 0.01
          collapsed: true
chartPercentage: &chartPercentage
  label: 'Percentage Chart'
  name: 'ChartPercentage'
