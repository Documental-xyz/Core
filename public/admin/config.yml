timeline: &timeline
  label: 'Timeline'
  name: 'Timeline'
  widget: 'object'
  summary: 'Timeline'
  collapsed: true
  fields:
    - label: 'Type'
      name: 'type'
      widget: 'hidden'
      default: 'Timeline'
      collapsed: true
    - label: 'Components'
      name: 'components'
      # max: 5 — baseado em nhanderekoa.md (14 Timelines, max 3 componentes cada). Permite ~66% crescimento.
      # Adicionado em Fase 1 do plano sveltia-perf para prevenir agravamento de lag.
      # Ver .omo/plans/sveltia-perf-fase0-fase1.md Task 8.
      widget: 'list'
      min: 0
      max: 5
      required: false
      collapsed: true
      types:
        - *timelineBullet
        - *text
        - *button
        - *imageBlock
        - *videoEmbed
        - *htmlEmbed
        - *spacer
        - *pullquote
        - *card
cards: &cards
  label: 'Image Cards'
  name: 'Cards'
  widget: 'object'
  summary: '{{fields.cardsArr}}'
  collapsed: true
  fields:
    - label: 'Type'
      name: 'type'
      widget: 'hidden'
      default: 'Cards'
      collapsed: true
    - label: 'Cards'
      name: 'cardsArr'
      # max: 2 — baseado em nhanderekoa.md (max 1 card por Cards, 2 instâncias). Permite 2x crescimento.
      # Adicionado em Fase 1 do plano sveltia-perf para prevenir agravamento de lag.
      # Ver .omo/plans/sveltia-perf-fase0-fase1.md Task 8.
      widget: 'list'
      min: 0
      max: 2
      required: false
      collapsed: true
      fields:
        - *card
