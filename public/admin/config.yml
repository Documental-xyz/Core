      widget: 'hidden'
      default: 'ChartPercentage'
      collapsed: true
    - label: 'Title'
      name: 'chartPercentageTitle'
      widget: 'string'
      required: false
      collapsed: true
    - label: 'Notes'
      name: 'chartPercentageNotes'
      widget: 'string'
      required: false
      collapsed: true
    - label: 'Values'
      name: 'chartPercentageValues'
      widget: 'list'
      required: false
      collapsed: true
      fields:
        - label: 'Label'
          name: 'label'
          widget: 'string'
          required: true
          collapsed: true
        - label: 'Color'
          name: 'color'
          widget: 'color'
          required: false
          enableAlpha: true
          allowInput: true
          collapsed: true
        - label: 'Number'
          name: 'number'
          widget: 'number'
          value_type: 'float'
          step: 0.01
          required: true
          collapsed: true
bigNumbers: &bigNumbers
  label: 'Big Numbers'
  name: 'BigNumbers'
  widget: 'object'
  summary: '{{fields.alignment}}'
  collapsed: true
  fields:
    - label: 'Type'
      name: 'type'
      widget: 'hidden'
      default: 'BigNumbers'
      collapsed: true
    - label: 'Alignment'
      name: 'alignment'
      widget: 'select'
      options:
        - { label: 'Caption-Bottom', value: 'caption-bottom' }
        - { label: 'Caption-Top', value: 'caption-top' }
      default: 'caption-bottom'
      collapsed: true
    - label: 'Items'
      name: 'items'
      widget: 'list'
      collapsed: true
      fields:
        - label: 'Number'
          name: 'number'
          widget: 'string'
          required: false
          collapsed: true
        - label: 'Caption'
          name: 'caption'
          widget: 'string'
          required: false
          collapsed: true
