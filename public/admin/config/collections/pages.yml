collections:
  - name: 'pages'
    label: 'Páginas'
    folder: '${PAGES_FOLDER}'
    create: true
    editor:
      preview: false
    slug: '{{slug}}'
    view_groups:
      default: by-projeto
      groups:
        - name: by-projeto
          label: Projeto
          field: projeto
    fields:
      - { label: 'Preview', name: 'standalone', widget: 'boolean', default: true, required: false, hint: 'Desative se esta página só deve existir quando embutida via Include em outra.' }

      - { label: 'Title', name: 'title', widget: 'string', required: false }
      - { label: 'Slug', name: 'slug', widget: 'string', required: true, hint: 'final part of the URL that corresponds to this page (ex: documental.xyz/slug)' }
      - { label: 'Project', name: 'projeto', widget: 'string', required: false, hint: 'Nome do projeto para agrupamento. Use o mesmo valor em páginas relacionadas.' }

      # Resources — all toggle sections.
      # `widget: object` + `required: false` makes Sveltia render a checkbox:
      # unchecked => object saved as null; checked => subfields appear.
      - *pageSettings
      - *pageTheme
      - label: 'Page Include'
        name: 'pageInclude'
        widget: 'object'
        required: false
        collapsed: true
        fields:
          - label: 'Main page slug'
            name: 'mainSlug'
            widget: 'relation'
            collection: 'pages'
            value_field: '{{slug}}'
            search_fields: ['title', 'slug']
            display_fields: ['title', 'slug']
            required: false
            hint: 'Slug da página principal desta cadeia.'
            filters:
              - field: slug
                values: ['{{slug}}']
                exclude: true
      - label: 'Modules'
        name: 'modules'
        widget: 'list'
        required: false
        collapsed: true
        label_singular: 'Module'
        min: 0
        max: 1
        types:
          - *mapBox

      - label: 'Components'
        name: 'components'
        widget: 'list'
        required: false
        collapsed: true
        min: 0
        max: 15
        types:
          - *group
          - *cta
          - *map
          - *spacer
          - *include
