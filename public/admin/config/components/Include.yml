include: &include
  label: 'Include'
  name: 'Include'
  widget: 'object'
  summary: '{{fields.slug}}'
  collapsed: true
  fields:
    - label: 'Type'
      name: 'type'
      widget: 'hidden'
      default: 'Include'
      collapsed: true
    - label: 'Slug da página alvo'
      name: 'slug'
      widget: 'relation'
      collection: 'pages'
      value_field: '{{slug}}'
      search_fields: ['title', 'slug']
      display_fields: ['title', 'slug']
      required: false
      hint: 'Selecione a página cujo conteúdo será incluído aqui.'
      filters:
        - field: slug
          values: ['{{slug}}']
          exclude: true
      collapsed: true
