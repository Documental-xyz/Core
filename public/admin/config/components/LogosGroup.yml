logosGroup: &logosGroup
  label: 'Logos Strip'
  name: 'LogosGroup'
  widget: 'object'
  summary: '{{fields.logos}}'
  collapsed: true
  fields:
    - label: 'Type'
      name: 'type'
      widget: 'hidden'
      default: 'LogosGroup'
      collapsed: true
    - label: 'Logos'
      name: 'logos'
      # max: 4 — baseado em nhanderekoa.md (max 3 logos por LogosGroup, 2 instâncias). Permite ~33% crescimento.
      # Adicionado em Fase 1 do plano sveltia-perf para prevenir agravamento de lag.
      # Ver .omo/plans/sveltia-perf-fase0-fase1.md Task 8.
      widget: 'list'
      min: 0
      max: 4
      required: false
      collapsed: true
      fields:
        - label: 'Image'
          name: 'image'
          widget: 'image'
          required: true
          collapsed: true
        - label: 'Link'
          name: 'link'
          widget: 'object'
          required: true
          collapsed: true
          fields:
            - label: 'URL'
              name: 'url'
              widget: 'string'
              required: true
              collapsed: true
            - label: 'Target'
              name: 'target'
              widget: 'select'
              options: ['_blank', '_parent', '_self', 'custom']
              required: false
              collapsed: true
            - label: 'Custom Target'
              name: 'customTarget'
              widget: 'string'
              required: false
              collapsed: true
            - label: 'Title'
              name: 'title'
              widget: 'string'
              required: false
              collapsed: true
