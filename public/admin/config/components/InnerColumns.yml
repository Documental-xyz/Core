innerColumns: &innerColumns
  label: 'Inner Columns'
  name: 'InnerColumns'
  widget: 'object'
  summary: 'Inner Columns'
  collapsed: true
  fields:
    - label: 'Type'
      name: 'type'
      widget: 'hidden'
      default: 'InnerColumns'
      collapsed: true
    - label: 'Column 1'
      name: 'column1'
      widget: 'object'
      required: true
      collapsed: true
      default: null
      fields:
        - label: 'Components'
          name: 'components'
          # max: 2 — baseado em nhanderekoa.md (max 1 componente por coluna, 3 InnerColumns). Permite 2x crescimento.
          # Adicionado em Fase 1 do plano sveltia-perf para prevenir agravamento de lag.
          # Ver .omo/plans/sveltia-perf-fase0-fase1.md Task 8.
          widget: 'list'
          min: 0
          max: 2
          required: false
          collapsed: true
          types:
            - *text
            - *chartBar
            - *chartPercentage
            - *imageBlock
            - *videoEmbed
            - *logosGroup
            - *bigNumbers
            - *pullquote
            - *spacer
            - *gallery
            - *slider
    - label: 'Column 2'
      name: 'column2'
      widget: 'object'
      required: true
      collapsed: false
      default: null
      fields:
        - label: 'Components'
          name: 'components'
          # max: 2 — baseado em nhanderekoa.md (max 1 componente por coluna, 3 InnerColumns). Permite 2x crescimento.
          # Adicionado em Fase 1 do plano sveltia-perf para prevenir agravamento de lag.
          # Ver .omo/plans/sveltia-perf-fase0-fase1.md Task 8.
          widget: 'list'
          min: 0
          max: 2
          required: false
          collapsed: true
          types:
            - *text
            - *chartBar
            - *chartPercentage
            - *imageBlock
            - *htmlEmbed
            - *videoEmbed
            - *logosGroup
            - *bigNumbers
            - *pullquote
            - *spacer
            - *gallery
            - *slider
