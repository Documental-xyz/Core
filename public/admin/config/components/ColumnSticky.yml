columnSticky: &columnSticky
  label: 'Fixed Column (Title Column)'
  name: 'ColumnSticky'
  widget: 'object'
  summary: '{{fields.title}}'
  collapsed: true
  fields:
    - label: 'Type'
      name: 'type'
      widget: 'hidden'
      default: 'ColumnSticky'
      collapsed: true
    - label: 'Text Color'
      name: 'txtColor'
      widget: 'color'
      required: false
      enableAlpha: true
      allowInput: true
      collapsed: true
    - label: 'Background Color'
      name: 'bgColor'
      widget: 'color'
      required: false
      enableAlpha: true
      allowInput: true
      collapsed: true
    - label: 'Padding Top'
      name: 'paddingTop'
      widget: 'boolean'
      required: false
      default: false
      hint: 'enable to add spacing to the top of the component'
      collapsed: true
    - label: 'Padding Bottom'
      name: 'paddingBottom'
      widget: 'boolean'
      required: false
      default: false
      hint: 'enable to add spacing to the bottom of the component'
      collapsed: true
    - label: 'Layout'
      name: 'layout'
      widget: 'select'
      options: 
        - { label: 'Text-Bigger', value: 'text-bigger' }
        - { label: 'Title-Bottom', value: 'title-bottom' }
      default: 'text-bigger'
      collapsed: true
    - label: 'Title'
      name: 'title'
      widget: 'string'
      required: false
      collapsed: true
    - label: 'Components'
      name: 'components'
      # max: 5 — baseado em nhanderekoa.md (max 4 componentes em 1 ColumnSticky). Permite ~25% crescimento.
      # Adicionado em Fase 1 do plano sveltia-perf para prevenir agravamento de lag.
      # Ver .omo/plans/sveltia-perf-fase0-fase1.md Task 8.
      widget: 'list'
      min: 0
      max: 5
      required: false
      collapsed: true
      types:
        - *text
        - *chartBar
        - *chartPercentage
        - *imageBlock
        - *htmlEmbed
        - *videoEmbed
        - *logosGroup
        - *innerColumns
        - *cardsCall
        - *compare
        - *pullquote
        - *spacer
        - *slider
        - *cards
        - *timeline
